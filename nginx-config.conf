server {
    listen 80;
    listen [::]:80;
    server_name entwicklungs-werkstatt.com www.entwicklungs-werkstatt.com;

    root /var/www/KI-coach-gespraechsfuehrung/Ikigai-Webseite/dist;
    index index.html;

    # Gzip-Komprimierung aktivieren
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    # Alle Requests zur index.html (für React Router / SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-Einstellungen für Assets (JS, CSS, Fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Keine Caching für HTML
    location ~* \.html?$ {
        expires -1;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
